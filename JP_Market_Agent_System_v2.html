<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Japan Market Intelligence Agent | Dr.Felis</title>
<style>
:root{--bg:#0c0e14;--s:#141620;--s2:#1c1f2e;--s3:#252840;--bd:#2a2e42;--t:#e2e4ef;--t2:#8b90a8;--t3:#5a5f78;
--ac:#6c7cff;--ac2:#4e5bdb;--g:#34d399;--r:#f87171;--o:#fbbf24;--bl:#60a5fa;--pu:#a78bfa;--cy:#22d3ee;--pk:#f472b6;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Pretendard',sans-serif;background:var(--bg);color:var(--t);font-size:12px;line-height:1.55;}
button{cursor:pointer;font-family:inherit;font-size:11px;}
input,select,textarea{font-family:inherit;font-size:11px;background:var(--s2);border:1px solid var(--bd);color:var(--t);border-radius:4px;padding:4px 6px;}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--ac);}
a{color:var(--bl);text-decoration:none;}a:hover{text-decoration:underline;}

/* Header */
.hd{background:var(--s);border-bottom:1px solid var(--bd);padding:10px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.hd h1{font-size:14px;font-weight:700;display:flex;align-items:center;gap:8px;}.hd h1 span{color:var(--ac);}
.hd-r{display:flex;gap:5px;align-items:center;}
.hb{background:var(--s2);border:1px solid var(--bd);color:var(--t2);padding:5px 10px;border-radius:5px;transition:.15s;white-space:nowrap;font-size:11px;}
.hb:hover{border-color:var(--ac);color:var(--t);}.hb.pr{background:var(--ac);border-color:var(--ac);color:#fff;}

/* Tabs */
.tabs{display:flex;gap:2px;padding:5px 20px;background:var(--s);border-bottom:1px solid var(--bd);position:sticky;top:39px;z-index:49;flex-wrap:wrap;}
.tab{padding:6px 12px;border-radius:5px;border:none;background:transparent;color:var(--t2);font-weight:500;transition:.15s;font-size:11px;}
.tab:hover{color:var(--t);background:var(--s2);}.tab.on{background:var(--ac);color:#fff;}
.sec{display:none;padding:16px 20px;}.sec.on{display:block;}

/* KPI */
.kpi-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:10px;margin-bottom:16px;}
.kpi{background:var(--s);border:1px solid var(--bd);border-radius:8px;padding:12px;}
.kpi .lb{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px;}
.kpi .vl{font-size:18px;font-weight:700;font-variant-numeric:tabular-nums;}
.kpi .sub{font-size:9px;color:var(--t3);margin-top:2px;}

/* Cards / Grid */
.cg{display:grid;gap:12px;grid-template-columns:repeat(auto-fill,minmax(380px,1fr));}
.cd{background:var(--s);border:1px solid var(--bd);border-radius:8px;padding:14px;transition:.2s;overflow:hidden;}
.cd:hover{border-color:var(--ac);}
.cd h3{font-size:12px;font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.fw{grid-column:1/-1;}

/* Tables */
.dt{width:100%;border-collapse:collapse;}
.dt th{text-align:left;padding:6px 8px;font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid var(--bd);background:var(--s2);}
.dt td{padding:6px 8px;border-bottom:1px solid var(--bd);font-size:11px;}
.dt tr:hover td{background:var(--s2);}
.dt .num{text-align:right;font-variant-numeric:tabular-nums;}
.pos{color:var(--g);}.neg{color:var(--r);}.warn{color:var(--o);}

/* Editable cells */
.dt input.ce{background:transparent;border:1px solid transparent;color:var(--bl);width:80px;text-align:right;padding:2px 4px;font-variant-numeric:tabular-nums;font-size:11px;}
.dt input.ce:focus{border-color:var(--ac);background:rgba(108,124,255,.08);}
.dt input.ce:hover{border-color:var(--bd);}

/* Badges */
.badge{display:inline-block;padding:2px 7px;border-radius:3px;font-size:9px;font-weight:600;}
.bg{background:rgba(52,211,153,.12);color:var(--g);}
.bo{background:rgba(251,191,36,.12);color:var(--o);}
.br{background:rgba(248,113,113,.12);color:var(--r);}
.bb{background:rgba(96,165,250,.12);color:var(--bl);}
.bp{background:rgba(167,139,250,.12);color:var(--pu);}
.bk{background:rgba(244,114,182,.12);color:var(--pk);}

/* Agent cards */
.ag{background:var(--s);border:1px solid var(--bd);border-radius:10px;padding:16px;margin-bottom:12px;transition:.2s;}
.ag:hover{border-color:var(--ac);}
.ag-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.ag-h h3{font-size:13px;font-weight:700;display:flex;align-items:center;gap:8px;margin:0;}
.ag-n{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11px;color:#fff;flex-shrink:0;}
.ag-d{color:var(--t2);font-size:11px;margin-bottom:10px;line-height:1.6;}
.ag-tags{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;}
.ag-tag{background:var(--s2);border:1px solid var(--bd);padding:2px 8px;border-radius:3px;font-size:9px;color:var(--t2);}
.pbox{position:relative;}
.pa{width:100%;min-height:160px;background:var(--s2);border:1px solid var(--bd);border-radius:6px;color:var(--t);padding:10px;resize:vertical;line-height:1.65;font-family:'SF Mono','Fira Code','Consolas',monospace;font-size:11px;}
.pa:focus{border-color:var(--ac);}
.cbtn{position:absolute;top:6px;right:6px;background:var(--ac);border:none;color:#fff;padding:4px 12px;border-radius:4px;font-size:10px;font-weight:600;opacity:.7;transition:.15s;}
.cbtn:hover{opacity:1;}.cbtn.ok{background:var(--g);}

/* Intel entries */
.ie{background:var(--s);border:1px solid var(--bd);border-radius:8px;padding:14px;margin-bottom:10px;transition:.2s;}
.ie:hover{border-color:var(--ac);}
.ie-top{display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap;}
.ie-date{font-size:9px;color:var(--t3);}
.ie-src{font-size:9px;color:var(--bl);margin-left:auto;}
.ie-body{font-size:11.5px;line-height:1.7;margin-bottom:6px;}
.ie-action{font-size:11px;color:var(--ac);font-weight:500;margin-bottom:8px;padding:6px 8px;background:rgba(108,124,255,.06);border-radius:4px;}

/* Comments */
.cmt-area{border-top:1px solid var(--bd);padding-top:8px;margin-top:8px;}
.cmt{display:flex;gap:8px;align-items:flex-start;margin-bottom:6px;padding:6px 8px;background:var(--s2);border-radius:4px;}
.cmt-icon{color:var(--o);font-size:10px;flex-shrink:0;margin-top:2px;}
.cmt-text{font-size:10.5px;color:var(--t2);line-height:1.5;flex:1;}
.cmt-date{font-size:9px;color:var(--t3);flex-shrink:0;}
.cmt-input{display:flex;gap:6px;margin-top:6px;}
.cmt-input input{flex:1;padding:5px 8px;}
.cmt-input button{padding:5px 12px;white-space:nowrap;}

/* Competitor tracker */
.comp-card{background:var(--s);border:1px solid var(--bd);border-radius:8px;padding:14px;margin-bottom:10px;}
.comp-card h4{font-size:12px;font-weight:600;margin-bottom:8px;display:flex;align-items:center;gap:6px;}

/* Run history */
.rh-item{background:var(--s);border:1px solid var(--bd);border-radius:8px;padding:14px;margin-bottom:10px;}
.rh-item .rh-head{display:flex;align-items:center;gap:8px;margin-bottom:8px;cursor:pointer;}
.rh-item .rh-body{display:none;border-top:1px solid var(--bd);padding-top:10px;margin-top:4px;}
.rh-item.open .rh-body{display:block;}
.rh-toggle{color:var(--t3);font-size:10px;margin-left:auto;}

/* Modal */
.modal-bg{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);z-index:100;display:none;align-items:center;justify-content:center;}
.modal-bg.on{display:flex;}
.modal{background:var(--s);border:1px solid var(--bd);border-radius:12px;padding:24px;width:560px;max-width:90vw;max-height:80vh;overflow-y:auto;}
.modal h2{font-size:14px;font-weight:700;margin-bottom:16px;}
.modal label{display:block;font-size:11px;color:var(--t2);margin-bottom:4px;margin-top:10px;}
.modal input,.modal textarea,.modal select{width:100%;}
.modal textarea{min-height:80px;resize:vertical;}
.modal-btns{display:flex;gap:8px;margin-top:16px;justify-content:flex-end;}

@media(max-width:768px){.cg{grid-template-columns:1fr;}.kpi-row{grid-template-columns:repeat(2,1fr);}}
</style>
</head>
<body>

<div class="hd">
  <h1><span>Dr.Felis</span> Japan Market Intelligence</h1>
  <div class="hd-r">
    <button class="hb" onclick="exportAll()">Export All</button>
    <button class="hb" onclick="resetData()" style="color:var(--r)">Reset</button>
  </div>
</div>

<div class="tabs">
  <button class="tab on" data-t="overview">Overview</button>
  <button class="tab" data-t="agents">Agent Prompts</button>
  <button class="tab" data-t="runs">Agent 실행 이력</button>
  <button class="tab" data-t="intel">Market Intelligence</button>
  <button class="tab" data-t="comp">경쟁사 트래킹</button>
  <button class="tab" data-t="sku">SKU 손익 분석</button>
  <button class="tab" data-t="howto">사용 가이드</button>
</div>

<!-- ========== OVERVIEW ========== -->
<div class="sec on" id="s-overview">
<div class="kpi-row" id="kpiRow"></div>
<div class="cg">
  <div class="cd fw" id="overviewInsights"></div>
  <div class="cd" id="overviewAgentStatus"></div>
  <div class="cd" id="overviewRoutine"></div>
  <div class="cd fw" id="overviewSkuSummary"></div>
  <div class="cd fw" id="overviewRecentComments"></div>
</div>
</div>

<!-- ========== AGENT PROMPTS ========== -->
<div class="sec" id="s-agents"></div>

<!-- ========== AGENT RUNS ========== -->
<div class="sec" id="s-runs">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
    <h2 style="font-size:14px;font-weight:700;">Agent 실행 이력</h2>
    <button class="hb pr" onclick="openRunModal()">+ 실행 결과 기록</button>
  </div>
  <div id="runsList"></div>
</div>

<!-- ========== INTEL ========== -->
<div class="sec" id="s-intel">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
    <h2 style="font-size:14px;font-weight:700;">Market Intelligence</h2>
    <div style="display:flex;gap:6px;">
      <select id="intelFilter" onchange="renderIntel()" style="padding:5px 8px;">
        <option value="all">전체</option><option value="시장">시장</option><option value="경쟁">경쟁</option>
        <option value="소비자">소비자</option><option value="채널">채널</option><option value="브랜드">브랜드</option>
      </select>
      <button class="hb pr" onclick="openIntelModal()">+ 인사이트 추가</button>
    </div>
  </div>
  <div id="intelList"></div>
</div>

<!-- ========== COMPETITOR ========== -->
<div class="sec" id="s-comp">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
    <h2 style="font-size:14px;font-weight:700;">Amazon JP / Rakuten 경쟁사 트래킹</h2>
    <button class="hb pr" onclick="openCompModal()">+ 경쟁사 추가</button>
  </div>
  <div id="compList"></div>
</div>

<!-- ========== SKU ========== -->
<div class="sec" id="s-sku">
  <h2 style="font-size:14px;font-weight:700;margin-bottom:6px;">SKU 손익 분석</h2>
  <p style="color:var(--bl);font-size:10px;margin-bottom:12px;">파란색 셀 = 직접 편집 가능 | 검은색 = 자동 계산</p>
  <div class="cd fw" style="overflow-x:auto;" id="skuTableWrap"></div>
  <div class="cg" style="margin-top:12px;">
    <div class="cd" id="skuOptions"></div>
    <div class="cd" id="skuSummary"></div>
  </div>
</div>

<!-- ========== HOWTO ========== -->
<div class="sec" id="s-howto">
  <h2 style="font-size:14px;font-weight:700;margin-bottom:16px;">사용 가이드</h2>
  <div class="cd fw" id="howtoContent"></div>
</div>

<!-- ========== MODALS ========== -->
<div class="modal-bg" id="intelModal">
  <div class="modal">
    <h2>인사이트 추가</h2>
    <label>카테고리</label>
    <select id="imCat"><option>시장</option><option>경쟁</option><option>소비자</option><option>채널</option><option>브랜드</option></select>
    <label>Agent (출처)</label>
    <input id="imAgent" placeholder="예: Agent 1, 수동 입력">
    <label>내용 (디테일하게)</label>
    <textarea id="imBody" placeholder="수치, 데이터, 구체적 사실 기반으로 작성"></textarea>
    <label>출처 URL</label>
    <input id="imSrc" placeholder="https://...">
    <label>Dr.Felis 시사점 (우리가 어떻게 대응할 것인가)</label>
    <textarea id="imAction" placeholder="이 데이터가 Dr.Felis에 주는 의미와 대응 방향"></textarea>
    <div class="modal-btns">
      <button class="hb" onclick="closeModal('intelModal')">취소</button>
      <button class="hb pr" onclick="saveIntel()">저장</button>
    </div>
  </div>
</div>

<div class="modal-bg" id="runModal">
  <div class="modal">
    <h2>Agent 실행 결과 기록</h2>
    <label>Agent</label>
    <select id="rmAgent"><option>Agent 1: Market Structure</option><option>Agent 2: Consumer Culture</option><option>Agent 3: Channel & Price</option><option>Agent 4: Brand Position</option><option>Agent 5: Strategic Advisor</option></select>
    <label>실행 결과 (Claude 응답 전체 또는 요약)</label>
    <textarea id="rmBody" style="min-height:200px;" placeholder="Claude의 분석 결과를 붙여넣으세요"></textarea>
    <label>핵심 발견 (1-3줄 요약)</label>
    <textarea id="rmKey" placeholder="이번 실행에서 가장 중요한 발견"></textarea>
    <div class="modal-btns">
      <button class="hb" onclick="closeModal('runModal')">취소</button>
      <button class="hb pr" onclick="saveRun()">저장</button>
    </div>
  </div>
</div>

<div class="modal-bg" id="compModal">
  <div class="modal">
    <h2>경쟁사 / 경쟁 상품 추가</h2>
    <label>플랫폼</label>
    <select id="cmPlat"><option>Amazon JP</option><option>Rakuten</option></select>
    <label>브랜드명</label>
    <input id="cmBrand" placeholder="예: いなば CIAO">
    <label>상품명</label>
    <input id="cmProduct" placeholder="예: ちゅ〜る まぐろ 14g×4本">
    <label>가격 (¥)</label>
    <input id="cmPrice" type="number" placeholder="298">
    <label>용량</label>
    <input id="cmSize" placeholder="예: 56g (14g×4)">
    <label>카테고리</label>
    <select id="cmCat"><option>페이스트/츄르</option><option>스틱</option><option>시니어 전용</option><option>기능성</option><option>프리미엄</option><option>기타</option></select>
    <label>비고 (리뷰수, 평점, 특이사항 등)</label>
    <textarea id="cmNote" placeholder="리뷰 2,340개, 평점 4.5, BSR #3 등"></textarea>
    <label>출처 URL</label>
    <input id="cmUrl" placeholder="https://amazon.co.jp/dp/...">
    <div class="modal-btns">
      <button class="hb" onclick="closeModal('compModal')">취소</button>
      <button class="hb pr" onclick="saveComp()">저장</button>
    </div>
  </div>
</div>

function getUserFeedback(agentNum){
  const cmts=[];
  DATA.runs.filter(r=>r.agent.includes(`Agent ${agentNum}`)).forEach(r=>{
    (r.comments||[]).forEach(c=>cmts.push(c.text));
  });
  DATA.intel.forEach(i=>{
    (i.comments||[]).forEach(c=>{
      if(c.text.includes(`Agent ${agentNum}`)||c.forAgent===agentNum)cmts.push(c.text);
    });
  });
  if(!cmts.length)return '(아직 유저 피드백 없음)';
  return cmts.map((c,i)=>`${i+1}. ${c}`).join('\n');
}

function copyP(btn){
  const ta=btn.parentElement.querySelector('.pa');
  navigator.clipboard.writeText(ta.value).then(()=>{
    btn.textContent='Copied!';btn.classList.add('ok');
    setTimeout(()=>{btn.textContent='Copy';btn.classList.remove('ok');},1500);
  });
}

  let html='';
  items.forEach((item,idx)=>{
    const cmtHtml=(item.comments||[]).map(c=>`<div class="cmt"><span class="cmt-icon">💬</span><span class="cmt-text">${c.text}</span><span class="cmt-date">${c.date}</span></div>`).join('');

    html+=`<div class="ie">
      <div class="ie-top">
        <span class="ie-date">${item.date}</span>
        <span class="badge ${catColors[item.cat]||'bb'}">${item.cat}</span>
        <span style="font-size:9px;color:var(--t3)">${item.agent}</span>
        ${item.src?`<a class="ie-src" href="${item.src}" target="_blank">${new URL(item.src).hostname}</a>`:''}
      </div>
      <div class="ie-body">${item.body}</div>
      <div class="ie-action">→ Dr.Felis 시사점: ${item.action}</div>
      <div class="cmt-area">
        ${cmtHtml}

      </div>

  });
  document.getElementById('intelList').innerHTML=html;

function saveIntel(){
  const item={
    id:Date.now(),
    date:new Date().toISOString().slice(0,10),
    cat:document.getElementById('imCat').value,
    agent:document.getElementById('imAgent').value||'수동 입력',
    body:document.getElementById('imBody').value,
    src:document.getElementById('imSrc').value,
    action:document.getElementById('imAction').value,
    comments:[]
  };
  if(!item.body){alert('내용을 입력하세요');return;}
  DATA.intel.unshift(item);save();
  closeModal('intelModal');
  ['imCat','imAgent','imBody','imSrc','imAction'].forEach(id=>document.getElementById(id).value='');
  renderAll();
}

function addIntelComment(id){
  const input=document.getElementById('cmt-i-'+id);
  if(!input.value.trim())return;

function updateSku(idx,field,val){
  DATA.skus[idx][field]=parseFloat(val)||0;
  recalcMargin(idx);
  save();renderSku();renderOverview();
}

function recalcMargin(idx){
  const s=DATA.skus[idx];
  // Simplified margin calc: (price_krw - ddp - logistics_per_unit) / price_krw * 100
  // price in yen → convert to krw (approx 9.0 krw per yen)
  const rate=9.0;
  const priceKrw=s.price*rate;
  const commissionAmt=priceKrw*(s.commission/100);
  const taxAmt=priceKrw*(s.tax/100);
  const totalCost=s.ddp+s.logistics+commissionAmt+taxAmt;
  s.margin=((priceKrw-totalCost)/priceKrw*100);
  s.status=s.margin>10?'수익':s.margin>0?'주의':'적자';
}

      <p style="font-size:10.5px;color:var(--t2);">유저 코멘트가 쌓일수록 Agent 프롬프트가 정교해지고, 분석 결과가 Dr.Felis에 최적화됩니다.<br>모든 데이터는 브라우저 localStorage에 저장됩니다. Export 버튼으로 백업 가능.</p>
    </div>`;
}

// ===== EXPORT / RESET =====
function exportAll(){
  const blob=new Blob([JSON.stringify(DATA,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='drfelis_japan_intel_'+new Date().toISOString().slice(0,10)+'.json';
  a.click();
}
function resetData(){
  if(!confirm('모든 데이터를 초기화하시겠습니까? (복원 불가)'))return;
  localStorage.removeItem('drf_data');location.reload();
}

// ===== RENDER ALL =====
function renderAll(){renderOverview();renderAgents();renderRuns();renderIntel();renderComp();renderSku();renderHowto();}
renderAll();
</script>
